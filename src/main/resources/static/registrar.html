<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Livraria10 - Registro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="img/Logo.png" type="image/x-icon">
</head>
<body>
    <header>
        <div class="menu">
            <a href="#" onclick="AbrirMenu()"><ion-icon name="menu-outline"></ion-icon></a>
        </div>
        
        <div class="logo">
            <img src="img/Logo.png" alt="">
            <h1>Livraria10</h1>
        </div>
        <div class="itens">
            <a href="index.html"><ion-icon name="book-outline"></ion-icon> Livros</a>
            <a href="registrar.html" id="select"><ion-icon name="person-add-outline"></ion-icon> Registrar</a>
            <a href="login.html"> <ion-icon name="person-outline"></ion-icon>Login</a>
        </div>
    </header>

   
    <div class="menuLateral" id="menuLateral">
        <div class="menuLateralItens">
            <div class="titulo">
                <h1>Menu</h1>
                <a href="#" onclick="fecharMenu() "><ion-icon name="close-outline"></ion-icon></a>
            </div>
            
            <a href="index.html"><ion-icon name="book-outline"></ion-icon> Livros</a>
            <a href="registrar.html" ><ion-icon name="person-add-outline"></ion-icon> Registrar</a>
            <a href="login.html"> <ion-icon name="person-outline"></ion-icon>Login</a>
        </div>
    </div>


    <form action="/usuarios/registrar" class="registro" method="POST" enctype="multipart/form-data">
        <h1>Registrar</h1> 
        <div class="itensRegistro">

            <p>Coloque sua foto:</p>
            <div class="foto-container" onclick="document.getElementById('foto').click()">
            <img id="preview">
            <ion-icon name="camera-outline" id="cameraIcon"></ion-icon>
        </div>
        <input type="file" name="foto" id="foto" style="display: none;" onchange="abrirModal(event)">

            <div id="modalFoto" style="display:none; position:fixed; z-index:1000; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5);">
                <div style="background:white; margin:10% auto; padding:20px; width:300px; text-align:center;">
                    <img id="modalImg" style="width:100%; height:auto;">
                    <button type="button" onclick="confirmarFoto()">OK</button>                
                </div>
            </div>

            <p>Coloque seu nome:</p>
            <div class="inputs">
                <input type="text" name="nome" id="nome" placeholder="Nome">
                <ion-icon name="person-outline"></ion-icon>
            </div>
            
            <p>Coloque seu email:</p>
            <div class="inputs">
                <input type="email" name="email" id="email" placeholder="Email">
                <ion-icon name="mail-outline"></ion-icon>
            </div>
            
            <p>Coloque sua senha:</p>
            <div class="inputs">
                <input type="password" name="senha" id="senha" placeholder="Senha">
                <span onclick="verSenha()">
                    <ion-icon name="eye-outline" id="olhoAberto"></ion-icon>
                    <ion-icon name="eye-off-outline" style="display: none;" id="olhoFechado"></ion-icon>
                </span>
                
            </div>
        </div>
        <input type="submit" value="Registrar" id="entrar">
    </form>

    <footer>
        <div class="itemPrincipal">
            <div class="itens1">
            <div class="footerLogo">
                <h1>Livraria10</h1>
                <img src="img/Logo.png" alt="">
            </div>
            
        <p>Uma livraria fictícia feita para treinar Spring Boot.</p>

        </div>


        <div class="itens2">
            <a href="https://www.instagram.com/vinirib01/">Instagram</a>
            <a href="https://github.com/ViniciusRib1">GitHub</a>
            <a href="https://www.linkedin.com/in/vinicius-ribeiro20/">LinkedIn</a>
        </div>
        </div>
        

        <div class="autor">
            <h1>©Vinicius Ribeiro</h1>
        </div>
    </footer>

</body>
<script src="script.js"></script>
<script type="module" src="https://unpkg.com/ionicons@8.0.13/dist/ionicons/ionicons.esm.js"></script>
<script nomodule src="https://unpkg.com/ionicons@8.0.13/dist/ionicons/ionicons.js"></script>
</html>
